<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Proxy Instance Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0e1117;
  --surface: #161b27;
  --card: #1e2640;
  --card2: #253060;
  --blue: #3d5afe;
  --blue2: #283593;
  --accent: #e53935;
  --green: #00e676;
  --yellow: #ffd740;
  --text: #e8edf6;
  --muted: #8892b0;
  --border: #2a3358;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── Header speed ── */
.speed-header { text-align: center; padding: 36px 20px 12px; }
.speed-num { font-family: 'Dancing Script', cursive; font-size: 3.2rem; color: #e53935; }
.speed-unit { font-size: 1.5rem; color: var(--muted); }
.speed-sub { font-style: italic; color: var(--muted); margin-top: 4px; font-size: .95rem; }

/* ── Add form ── */
.add-panel {
  max-width: 700px; margin: 0 auto 32px; padding: 0 20px;
}
.add-form {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 24px;
  display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
}
.add-form label { font-size: .75rem; color: var(--muted); display: block; margin-bottom: 4px; letter-spacing: .06em; text-transform: uppercase; }
.add-form input {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 8px 12px; font-size: .88rem; font-family: 'DM Mono', monospace;
  outline: none; transition: border .15s;
}
.add-form input:focus { border-color: var(--blue); }
.input-proxy { width: 200px; }
.input-url   { flex: 1; min-width: 180px; }
.btn-add {
  background: var(--blue); color: #fff; border: none; border-radius: 8px;
  padding: 9px 22px; font-weight: 700; font-size: .88rem; cursor: pointer;
  transition: filter .15s, transform .1s; white-space: nowrap;
}
.btn-add:hover { filter: brightness(1.15); }
.btn-add:active { transform: scale(.97); }

/* ── Section header ── */
.section-header { max-width: 1200px; margin: 0 auto; padding: 0 28px 16px; }
.section-header h2 { font-size: 1.6rem; font-weight: 700; }
.section-header p { color: var(--muted); font-size: .92rem; margin-top: 3px; }

/* ── Grid ── */
.grid {
  max-width: 1200px; margin: 0 auto; padding: 0 24px 48px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px;
}

/* ── Instance card ── */
.card {
  background: linear-gradient(145deg, var(--card2) 0%, var(--blue2) 100%);
  border-radius: 14px; padding: 20px 14px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  box-shadow: 0 4px 18px rgba(30,40,120,.25);
  position: relative; overflow: hidden;
  animation: fadeUp .35s ease both;
  transition: box-shadow .2s, transform .2s;
}
.card:hover { box-shadow: 0 10px 36px rgba(60,80,200,.28); transform: translateY(-2px); }

@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.status-dot {
  position: absolute; top: 10px; right: 10px;
  width: 9px; height: 9px; border-radius: 50%;
}
.dot-online    { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot-pending,
.dot-launching,
.dot-restarting { background: var(--yellow); animation: blink 1s ease-in-out infinite; }
.dot-stopped   { background: #546e7a; }
.dot-error     { background: var(--accent); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.bot-icon { width: 48px; height: 48px; }
.card-title { color: #fff; font-weight: 700; font-size: .95rem; }
.card-ip { color: #9fa8da; font-size: .68rem; font-family: 'DM Mono', monospace; text-align: center; word-break: break-all; }
.card-status { font-size: .68rem; color: var(--yellow); font-family: 'DM Mono', monospace; }

.card-actions { display: flex; gap: 6px; margin-top: 4px; }
.btn-restart, .btn-delete {
  border: none; border-radius: 7px;
  padding: 6px 14px; font-weight: 700; font-size: .78rem; cursor: pointer;
  transition: filter .15s, transform .1s;
}
.btn-restart { background: var(--accent); color: #fff; }
.btn-delete  { background: #37474f; color: #cfd8dc; }
.btn-restart:hover, .btn-delete:hover { filter: brightness(1.2); }
.btn-restart:active, .btn-delete:active { transform: scale(.96); }
.btn-restart:disabled { opacity: .5; cursor: default; }

/* spinning bot while restarting */
.spin { animation: spin 1s linear infinite; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

/* ── Add placeholder card ── */
.card-add {
  border: 2.5px dashed #2a4060; background: #111827;
  border-radius: 14px; min-height: 200px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .2s, border-color .2s;
}
.card-add:hover { background: #131f30; border-color: var(--blue); }
.card-add-inner { text-align: center; color: #3d5afe; }
.card-add-plus { font-size: 2.5rem; line-height: 1; }
.card-add-label { font-size: .8rem; margin-top: 6px; font-weight: 600; }

/* ── Empty state ── */
.empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px 0; }
</style>
</head>
<body>

<!-- Speed header -->
<div class="speed-header">
  <div>
    <span class="speed-num" id="speedNum">0.00</span>
    <span class="speed-unit"> px/ps</span>
  </div>
  <div class="speed-sub">The bot's blazing speed!</div>
</div>

<!-- Add instance form -->
<div class="add-panel">
  <div class="add-form">
    <div>
      <label>Proxy (host:port)</label>
      <input class="input-proxy" id="inputProxy" type="text" placeholder="145.223.44.209:5892" spellcheck="false"/>
    </div>
    <div>
      <label>Target URL</label>
      <input class="input-url" id="inputUrl" type="text" placeholder="https://example.com" value="https://example.com"/>
    </div>
    <button class="btn-add" onclick="addInstance()">+ Add Instance</button>
  </div>
</div>

<!-- Section header -->
<div class="section-header">
  <h2>Instance Manager</h2>
  <p>Manage and monitor your proxy browser instances</p>
</div>

<!-- Cards grid -->
<div class="grid" id="grid">
  <div class="empty" id="emptyMsg">No instances yet. Add one above ↑</div>
</div>

<script>
// ── Bot SVG ──────────────────────────────────────────────────────────────────
const BOT_SVG = `<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="20" cy="20" r="18" fill="#5c6bc0"/>
  <rect x="12" y="14" width="16" height="12" rx="3" fill="#e8eaf6"/>
  <circle cx="16" cy="19" r="2" fill="#3949ab"/>
  <circle cx="24" cy="19" r="2" fill="#3949ab"/>
  <rect x="17" y="23" width="6" height="1.5" rx=".75" fill="#7986cb"/>
  <rect x="18" y="10" width="4" height="4" rx="1" fill="#e8eaf6"/>
  <circle cx="20" cy="10" r="1.5" fill="#ff6b6b"/>
  <rect x="8" y="18" width="3" height="5" rx="1.5" fill="#e8eaf6"/>
  <rect x="29" y="18" width="3" height="5" rx="1.5" fill="#e8eaf6"/>
  <rect x="15" y="8" width="10" height="3" rx="1.5" fill="#ffd54f"/>
</svg>`;

// ── Speed ticker ─────────────────────────────────────────────────────────────
let speed = 0;
setInterval(() => {
  speed = Math.max(0, speed + (Math.random() - 0.48) * 0.4);
  document.getElementById("speedNum").textContent = speed.toFixed(2);
}, 1800);

// ── State ─────────────────────────────────────────────────────────────────────
let instances = [];

// ── Fetch & render ────────────────────────────────────────────────────────────
async function fetchInstances() {
  try {
    const res = await fetch("/api/instances");
    instances = await res.json();
    render();
  } catch(e) { /* server not ready yet */ }
}

setInterval(fetchInstances, 2500);
fetchInstances();

function render() {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyMsg");

  empty.style.display = instances.length === 0 ? "block" : "none";

  // Remove cards no longer present
  const existingIds = new Set([...grid.querySelectorAll(".card[data-id]")].map(el => el.dataset.id));
  const currentIds  = new Set(instances.map(i => i.id));
  existingIds.forEach(id => { if (!currentIds.has(id)) document.querySelector(`.card[data-id="${id}"]`)?.remove(); });

  // Add new / update existing
  instances.forEach((inst, idx) => {
    let card = grid.querySelector(`.card[data-id="${inst.id}"]`);
    const isNew = !card;

    if (isNew) {
      card = document.createElement("div");
      card.className = "card";
      card.dataset.id = inst.id;
      card.style.animationDelay = `${idx * 0.04}s`;
      // Insert before the add-placeholder
      const placeholder = grid.querySelector(".card-add");
      grid.insertBefore(card, placeholder || null);
    }

    const status = inst.status || "unknown";
    const dotClass = status.startsWith("error") ? "dot-error"
      : ["online","stopped"].includes(status) ? `dot-${status}`
      : status === "restarting" || status === "launching" || status === "pending" ? `dot-${status}`
      : "dot-pending";

    const isRestarting = ["restarting","launching","pending"].includes(status);

    card.innerHTML = `
      <div class="status-dot ${dotClass}"></div>
      <div class="bot-icon ${isRestarting ? "spin" : ""}">${BOT_SVG}</div>
      <div class="card-title">Instance #${inst.num ?? idx}</div>
      <div class="card-ip">${inst.proxy}</div>
      <div class="card-status">${status}</div>
      <div class="card-actions">
        <button class="btn-restart" onclick="restartInstance('${inst.id}')" ${isRestarting ? "disabled" : ""}>
          ${isRestarting ? "..." : "Restart"}
        </button>
        <button class="btn-delete" onclick="deleteInstance('${inst.id}')">✕</button>
      </div>`;
  });

  // Ensure add-placeholder is last
  if (!grid.querySelector(".card-add")) {
    const ph = document.createElement("div");
    ph.className = "card-add";
    ph.onclick = focusAddForm;
    ph.innerHTML = `<div class="card-add-inner"><div class="card-add-plus">+</div><div class="card-add-label">Add Instance</div></div>`;
    grid.appendChild(ph);
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function addInstance() {
  const proxy = document.getElementById("inputProxy").value.trim();
  const url   = document.getElementById("inputUrl").value.trim() || "https://example.com";
  if (!proxy) { document.getElementById("inputProxy").focus(); return; }

  await fetch("/api/instances", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ proxy, url })
  });
  document.getElementById("inputProxy").value = "";
  fetchInstances();
}

async function restartInstance(id) {
  await fetch(`/api/instances/${id}/restart`, { method: "POST" });
  fetchInstances();
}

async function deleteInstance(id) {
  await fetch(`/api/instances/${id}`, { method: "DELETE" });
  instances = instances.filter(i => i.id !== id);
  render();
}

function focusAddForm() {
  document.getElementById("inputProxy").focus();
  document.getElementById("inputProxy").scrollIntoView({ behavior: "smooth" });
}

// Enter key on proxy input
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("inputProxy").addEventListener("keydown", e => { if(e.key==="Enter") addInstance(); });
  document.getElementById("inputUrl").addEventListener("keydown", e => { if(e.key==="Enter") addInstance(); });
});
</script>
</body>
</html>
